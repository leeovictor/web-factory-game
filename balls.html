<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Balls Demo</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
      }
      #wrap {
        position: relative;
      }
      canvas {
        border: 1px solid #333;
        background: linear-gradient(to bottom, #0b1026 0%, #1b1f3b 45%, #2d2a4a 75%, #3d2f2f 100%);
        display: block;
      }
      #ui {
        position: absolute;
        top: 8px;
        left: 8px;
        color: #ccc;
        font-size: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        background: rgba(0,0,0,0.5);
        padding: 8px 12px;
        border-radius: 6px;
        user-select: none;
      }
      #ui label { display: flex; align-items: center; gap: 8px; }
      #ui input[type="range"] { width: 120px; }
      #fps { color: #7bed9f; font-weight: bold; }
      #count { color: #70a1ff; }
      #renderedCount { color: #7bed9f; }
      #staticCount { color: #a29bfe; }
      #dynamicCount { color: #ffc048; }
      #culledCount { color: #ff5e57; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="canvas" width="1200" height="675"></canvas>
      <div id="ui">
        <div>Balls Demo — Bouncing balls</div>
        <label>
          Balls:
          <input id="ballSlider" type="range" min="0" max="20000" value="500" />
          <span id="ballSliderVal">500</span>
        </label>
        <div>FPS: <span id="fps">0</span></div>
        <label><input id="debugToggle" type="checkbox" checked /> Show grid cells</label>
        <div>Entities: <span id="count">0</span> | Fast: <span id="fastCount">0</span></div>
        <div>Static: <span id="staticCount">0</span> | Dynamic: <span id="dynamicCount">0</span></div>
        <div>Rendered: <span id="renderedCount">0</span> / <span id="totalCount">0</span> (<span id="culledCount">0</span> culled)</div>
        <div>Tick: <span id="tickTime">0</span> ms / <span id="phaseTimings">...</span></div>
      </div>
    </div>
    <script type="module" src="/src/demo/balls-demo.ts"></script>
  </body>
</html>
