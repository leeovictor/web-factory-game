<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Mining & Defense</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Segoe UI', sans-serif;
        color: #ccc;
      }
      #wrap {
        position: relative;
      }
      canvas {
        display: block;
        border: 1px solid #222;
      }
      #ui {
        position: absolute;
        top: 8px;
        left: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        background: rgba(0,0,0,0.7);
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 13px;
        user-select: none;
      }
      #stats { color: #ccc; white-space: nowrap; }
      #stats #resources { color: #ffd93d; font-weight: bold; }
      #stats #energy { color: #ffa502; font-weight: bold; }
      #stats #wave { color: #ff6b6b; font-weight: bold; }
      #stats #waveTimer { color: #ccc; }
      #attackAlert {
        display: none;
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 71, 87, 0.2);
        border: 1px solid #ff4757;
        color: #ff6b6b;
        padding: 6px 20px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        pointer-events: none;
        text-shadow: 0 0 8px rgba(255, 71, 87, 0.5);
        animation: pulse 1s ease-in-out infinite alternate;
      }
      @keyframes pulse {
        from { opacity: 0.6; }
        to { opacity: 1; }
      }
      #buildMenu {
        display: flex;
        gap: 4px;
      }
      #buildMenu button {
        flex: 1;
        padding: 4px 6px;
        border: 2px solid #444;
        border-radius: 4px;
        background: rgba(255,255,255,0.05);
        color: #ccc;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.15s;
      }
      #buildMenu button:hover {
        background: rgba(255,255,255,0.1);
        border-color: #666;
      }
      #buildMenu button.active {
        border-color: #4ecdc4;
        background: rgba(78, 205, 196, 0.15);
        color: #4ecdc4;
      }
      #gameOver {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 48px;
        font-weight: bold;
        color: #ff4757;
        text-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="canvas" width="1200" height="675"></canvas>
      <div id="attackAlert">⚠ ATAQUE EM CURSO</div>
      <div id="ui">
        <div id="stats">💰 <span id="resources">100</span>  ⚡ <span id="energy">0/0</span>  🌊 <span id="wave">1</span> (<span id="waveTimer">30</span>s)</div>
        <div id="buildMenu">
          <button data-build="miner">Miner (20)</button>
          <button data-build="turret">Turret (50)</button>
          <button data-build="laser">Laser (75)</button>
          <button data-build="solar">Solar (30)</button>
          <button data-build="demolish">X</button>
        </div>
        <div style="font-size:11px;color:#555;text-align:right;">FPS: <span id="fps">0</span></div>
      </div>
      <div id="gameOver">GAME OVER</div>
    </div>
    <script type="module" src="/src/demo/play/index.ts"></script>
  </body>
</html>
